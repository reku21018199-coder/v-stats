<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Stats Pro v7.1</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
            --neon-blue: #00e5ff;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 0; overflow: hidden; font-size: 11px; touch-action: manipulation; }
        
        /* メインコンテナ */
        .container { display: flex; height: calc(100vh - 95px); padding: 2px; gap: 4px; }
        
        /* コートエリア：横スクロール対応 */
        .court-wrapper { flex: 7; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; background: #000; border-radius: 4px; }
        .court-area { 
            display: grid; 
            grid-template-columns: repeat(3, 300px); /* 1枚の横幅を固定 */
            grid-template-rows: repeat(2, 1fr); 
            gap: 5px; 
            background: var(--court-green); 
            padding: 8px; 
            width: 900px; /* 前衛3人+後衛3人の幅を確保 */
            height: 100%;
            box-sizing: border-box;
            border: 3px solid #fff;
        }

        .sidebar { flex: 2.5; background: #222; padding: 5px; border-radius: 4px; display: flex; flex-direction: column; min-width: 120px; }
        .bench-list { flex: 1; overflow-y: auto; }
        
        /* フィードバックエリア：直近履歴＋分析 */
        #live-feedback { height: 140px; background: #000; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 10px; color: var(--neon-blue); overflow-y: auto; margin-top: 5px; border-left: 3px solid var(--blue); }
        .history-log { color: #888; border-bottom: 1px solid #333; margin-bottom: 3px; font-size: 9px; }

        .player-card { background: var(--card-bg); border-radius: 4px; padding: 3px; display: flex; flex-direction: column; border: 2px solid transparent; scroll-snap-align: start; }
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; height: 22px; }
        .player-header input { background: transparent; border: none; color: #fff; font-size: 11px; width: 45%; font-weight: bold; }
        
        .item-group { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #333; }
        .item-label { font-size: 9px; color: var(--gold); font-weight: bold; }
        
        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 2px 0; }
        .action-btn { border: none; border-radius: 2px; color: #fff; font-size: 12px; padding: 6px 0; cursor: pointer; font-weight: bold; }
        
        .stat-line { display: flex; justify-content: space-around; font-size: 11px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 5px var(--blue); margin: 2px 0; }
        .eff-val { font-size: 10px; text-align: center; font-weight: bold; color: #fff; }

        .bench-item { background: #333; padding: 8px; margin-bottom: 4px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
        .selected-player { border-color: var(--blue) !important; background: #0d47a1 !important; box-shadow: 0 0 10px var(--blue); }

        footer { position: fixed; bottom: 0; width: 100%; height: 95px; background: #1a1a1a; border-top: 2px solid #444; display: flex; align-items: center; padding: 0 10px; gap: 8px; box-sizing: border-box; z-index: 1000; }
        .score-board { display: flex; align-items: center; gap: 5px; background: #000; padding: 5px 10px; border-radius: 6px; border: 1px solid #555; }
        .score-num { font-size: 38px; font-weight: bold; color: var(--gold); min-width: 50px; text-align: center; }
        .score-label { font-size: 9px; color: #aaa; text-align: center; display: block; }
        .score-btn { width: 42px; height: 42px; background: #444; border: none; color: #fff; font-size: 24px; cursor: pointer; border-radius: 4px; }

        #startup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="startup-modal">
    <h2 style="color:var(--gold);">初期目玉設定</h2>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P4<input id="no-4" style="width:80%"><input id="name-4" style="width:80%"></div>
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P3<input id="no-3" style="width:80%"><input id="name-3" style="width:80%"></div>
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P2<input id="no-2" style="width:80%"><input id="name-2" style="width:80%"></div>
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P5<input id="no-5" style="width:80%"><input id="name-5" style="width:80%"></div>
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P6<input id="no-6" style="width:80%"><input id="name-6" style="width:80%"></div>
        <div class="medama-slot" style="width:90px; height:60px; border:1px dashed #fff; padding:5px; text-align:center;">P1<input id="no-1" style="width:80%"><input id="name-1" style="width:80%"></div>
    </div>
    <button class="score-btn" style="width:200px; margin-top:20px; background:var(--blue); font-size:16px;" onclick="initGame()">試合開始</button>
</div>

<div class="container">
    <div class="court-wrapper">
        <div class="court-area" id="court"></div>
    </div>
    <div class="sidebar">
        <div class="bench-list" id="bench"></div>
        <div id="live-feedback"></div>
    </div>
</div>

<footer>
    <div class="score-board">
        <div><span class="score-label">自チーム</span><button class="score-btn" onclick="modifyScore('us', 1)">+</button></div>
        <span class="score-num" id="score-us">0</span>
        <span style="font-size:20px;">-</span>
        <span class="score-num" id="score-them">0</span>
        <div><span class="score-label">相手</span><button class="score-btn" onclick="modifyScore('them', 1)">+</button></div>
        <div style="margin-left:8px; border-left:1px solid #444; padding-left:8px;">
            <span style="font-size:9px;">ROT</span><br>
            <span style="font-size:24px; font-weight:bold; color:var(--blue);">S<span id="current-rot">1</span></span>
        </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:4px;">
        <button class="score-btn" style="width:75px; font-size:13px; background:var(--gold);" onclick="finishGame()">終了</button>
        <button class="score-btn" style="width:75px; font-size:11px; background:#444;" onclick="undo()">戻る</button>
    </div>
</footer>

<script>
    const STORAGE_KEY = 'vstats_v7_1';
    let players = Array.from({length: 15}, (_, i) => ({
        id: i, no: i+1, name: `選手${i+1}`,
        spike:{ex:0,ok:0,bad:0,miss:0}, serve:{ex:0,ok:0,bad:0,miss:0},
        rec:{a:0,b:0,c:0,miss:0}, dig:{ex:0,ok:0,bad:0,miss:0},
        block:{ex:0,ok:0,bad:0,miss:0}
    }));

    let courtIds = [0,1,2,3,4,5]; 
    let score = {us: 0, them: 0};
    let currentRot = 1;
    let serveRights = 'us';
    let rotStats = Array.from({length: 7}, () => ({plus:0, minus:0}));
    let history = [];
    let swapTarget = null;

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({players, courtIds, score, currentRot, serveRights, rotStats, history}));
        updateFeedback();
    }

    function initGame() {
        [1,2,3,4,5,6].forEach(p => {
            const noVal = document.getElementById(`no-${p}`).value;
            const nameVal = document.getElementById(`name-${p}`).value;
            if(noVal) players[p-1].no = noVal;
            if(nameVal) players[p-1].name = nameVal;
        });
        document.getElementById('startup-modal').style.display = 'none';
        save(); render();
    }

    function render() {
        const court = document.getElementById('court');
        court.innerHTML = '';
        // 前衛(P4,3,2) 後衛(P5,6,1) の順にグリッド配置
        [3, 2, 1, 4, 5, 0].forEach(idx => {
            const id = courtIds[idx];
            const p = players[id];
            const card = document.createElement('div');
            card.className = `player-card ${swapTarget === id ? 'selected-player' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <span onclick="selectSwap(${id})">🔄</span>
                    <input type="text" value="#${p.no}" onchange="players[${id}].no=this.value; save();">
                    <input type="text" value="${p.name}" onchange="players[${id}].name=this.value; save();">
                </div>
                ${createRow(id, 'スパイク', 'spike', ['◎','○','△','×'])}
                ${createRow(id, 'レセプション', 'rec', ['A','B','C','×'])}
                ${createRow(id, 'サーブ', 'serve', ['◎','○','△','×'])}
                ${createRow(id, 'ブロック', 'block', ['◎','○','△','×'])}
                ${createRow(id, 'ディグ', 'dig', ['◎','○','△','×'])}
            `;
            court.appendChild(card);
        });

        const bench = document.getElementById('bench');
        bench.innerHTML = '<div style="font-size:9px; color:#888;">ベンチ</div>';
        players.forEach(p => {
            if(courtIds.includes(p.id)) return;
            const item = document.createElement('div');
            item.className = `bench-item ${swapTarget === p.id ? 'selected-player' : ''}`;
            item.onclick = () => selectSwap(p.id);
            item.innerHTML = `#${p.no} ${p.name}`;
            bench.appendChild(item);
        });
        document.getElementById('score-us').innerText = score.us;
        document.getElementById('score-them').innerText = score.them;
        document.getElementById('current-rot').innerText = currentRot;
    }

    function createRow(pid, label, cat, btns) {
        const s = players[pid][cat];
        const counts = (cat==='rec') ? [s.a, s.b, s.c, s.miss] : [s.ex, s.ok, s.bad, s.miss];
        let eff = (cat==='rec') ? getRecRate(s) : getEff(s);
        const cols = ['var(--gold)','var(--green)','var(--orange)','var(--red)'];
        return `
            <div class="item-group">
                <span class="item-label">${label}</span>
                <div class="btn-row">
                    ${btns.map((b,i)=>`<button class="action-btn" style="background:${cols[i]}" onclick="record(${pid},'${cat}','${['ex','ok','bad','miss'][i]}')">${b}</button>`).join('')}
                </div>
                <div class="stat-line">
                    ${counts.map(c=>`<span>${c}</span>`).join('')}
                </div>
                <div class="eff-val">${eff}%</div>
            </div>
        `;
    }

    function modifyScore(side, val) {
        let rotated = false;
        let prevServeRights = serveRights;
        if(side === 'us' && val > 0 && serveRights === 'them') { rotate(); serveRights = 'us'; rotated = true; }
        else if (side === 'them' && val > 0) { serveRights = 'them'; }
        score[side] += val;
        if(val > 0) { if(side === 'us') rotStats[currentRot].plus++; else rotStats[currentRot].minus++; }
        history.push({type: 'score', side, val, rotated, prevServeRights});
        save(); render();
    }

    function rotate() {
        const p = courtIds;
        courtIds = [p[1], p[2], p[3], p[4], p[5], p[0]];
        currentRot = currentRot === 6 ? 1 : currentRot + 1;
    }

    function record(pid, cat, type) {
        const key = (cat==='rec' && type==='ex') ? 'a' : (cat==='rec' && type==='ok') ? 'b' : (cat==='rec' && type==='bad') ? 'c' : type;
        players[pid][cat][key]++;
        history.push({type: 'stat', pid, cat, key, label: players[pid].name + " " + cat});
        save(); render();
    }

    function undo() {
        if(history.length === 0) return;
        const last = history.pop();
        if(last.type === 'stat') players[last.pid][last.cat][last.key]--;
        else if(last.type === 'score') {
            score[last.side] -= last.val;
            if(last.val > 0) { if(last.side === 'us') rotStats[currentRot].plus--; else rotStats[currentRot].minus--; }
            if(last.rotated) { const p = courtIds; courtIds = [p[5], p[0], p[1], p[2], p[3], p[4]]; currentRot = currentRot === 1 ? 6 : currentRot - 1; }
            serveRights = last.prevServeRights;
        }
        save(); render();
    }

    function updateFeedback() {
        const fb = document.getElementById('live-feedback');
        let html = "【入力履歴】\n";
        history.slice(-3).reverse().forEach(h => {
            html += `<div class="history-log">${h.type==='stat' ? h.label : h.side + "点追加"}</div>`;
        });
        html += "\n【分析】\n";
        const worst = [...rotStats].map((s,i)=>({i,d:s.plus-s.minus})).slice(1).sort((a,b)=>a.d-b.d)[0];
        if(worst.d < 0) html += `S${worst.i}ローテ失点中(${worst.d})`;
        fb.innerHTML = html;
    }

    function selectSwap(id) {
        if (swapTarget === null) swapTarget = id;
        else {
            const idxA = courtIds.indexOf(swapTarget);
            const idxB = courtIds.indexOf(id);
            if(idxA !== -1) courtIds[idxA] = id;
            if(idxB !== -1) courtIds[idxB] = swapTarget;
            swapTarget = null;
        }
        save(); render();
    }

    function finishGame() {
        if(confirm("データをクリアして初期画面に戻りますか？")) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    const getEff = (s) => { const t = s.ex + s.ok + s.bad + s.miss; return t > 0 ? ((s.ex - s.miss) / t * 100).toFixed(1) : "0.0"; };
    const getRecRate = (r) => { const t = r.a + r.b + r.c + r.miss; return t > 0 ? ((r.a * 100 + r.b * 50) / t).toFixed(1) : "0.0"; };

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) {
            const data = JSON.parse(saved);
            Object.assign(players, data.players); courtIds = data.courtIds; score = data.score;
            currentRot = data.currentRot; serveRights = data.serveRights; rotStats = data.rotStats; history = data.history;
            document.getElementById('startup-modal').style.display = 'none';
            render();
        }
        updateFeedback();
    };
</script>
</body>
</html>
