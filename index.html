<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Analyzer Pro</title>
    <style>
        :root {
            --court-green: #2e7d32;
            --player-bg: #ffffff;
            --accent-blue: #007bff;
        }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        
        /* ヘッダー */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: #333; color: white; border-radius: 8px; margin-bottom: 10px;
        }
        .menu-btn { background: #555; border: none; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        /* コート配置（3列×2行） */
        .court {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            background: var(--court-green);
            padding: 12px;
            border: 4px solid white;
            border-radius: 12px;
            min-height: 500px; /* 空白にならないよう高さを確保 */
        }

        /* 選手カード */
        .player-card {
            background: var(--player-bg);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 3px solid transparent;
        }
        .active-swap { border-color: var(--accent-blue); background: #e3f2fd; }

        .player-header { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .player-num { background: #333; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 8px; }
        .player-name { font-weight: bold; font-size: 16px; flex-grow: 1; }

        /* 交代マーク */
        .swap-icon { font-size: 20px; cursor: pointer; color: var(--accent-blue); padding: 2px; }

        /* 記録ボタンエリア（ここが空白だった部分） */
        .action-container { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; justify-content: center; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        
        button.record-btn {
            border: none; padding: 12px 0; border-radius: 6px; color: white; 
            font-weight: bold; font-size: 14px; cursor: pointer; transition: opacity 0.2s;
        }
        button.record-btn:active { opacity: 0.7; }
        .btn-ace { background: #28a745; }
        .btn-eff { background: #ffc107; color: #333; }
        .btn-std { background: #6c757d; }
        .btn-err { background: #dc3545; }

        /* モーダル */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-body { background: white; padding: 20px; border-radius: 12px; width: 85%; max-height: 70vh; overflow-y: auto; }

        .btn-finish { width: 100%; margin-top: 20px; padding: 15px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <span>V-Stats Analyzer</span>
    <button class="menu-btn" onclick="toggleModal()">選手名簿</button>
</header>

<div class="court" id="court">
    </div>

<button class="btn-finish" onclick="finishGame()">試合終了・データ分析</button>

<div id="modal">
    <div class="modal-body">
        <h3>登録メンバー</h3>
        <div id="member-list"></div>
        <button class="btn-finish" onclick="toggleModal()" style="background:#888;">閉じる</button>
    </div>
</div>

<script>
    const GAS_URL = "あなたのGASのURL"; // 必ず貼り替えてください

    // 選手データ
    let allPlayers = [
        { id: 1, name: "伊藤", number: 4 },
        { id: 2, name: "田中", number: 3 },
        { id: 3, name: "佐藤", number: 2 },
        { id: 4, name: "渡辺", number: 5 },
        { id: 5, name: "中村", number: 6 },
        { id: 6, name: "山田", number: 1 },
        { id: 7, name: "高橋(L)", number: 12 }
    ];

    // 初期配置
    let courtPosition = [
        allPlayers[0], allPlayers[1], allPlayers[2], // 前衛
        allPlayers[3], allPlayers[4], allPlayers[5]  // 後衛
    ];

    let swapIdx = null;
    let stats = [];

    function render() {
        const container = document.getElementById('court');
        container.innerHTML = '';

        courtPosition.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `player-card ${swapIdx === i ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <div class="player-num">${p.number}</div>
                    <div class="player-name">${p.name}</div>
                    <div class="swap-icon" onclick="handleSwap(${i})">🔄</div>
                </div>
                <div class="action-container">
                    <div class="action-row">
                        <button class="record-btn btn-ace" onclick="record(${p.id},'◎')">◎</button>
                        <button class="record-btn btn-eff" onclick="record(${p.id},'〇')">〇</button>
                    </div>
                    <div class="action-row">
                        <button class="record-btn btn-std" onclick="record(${p.id},'△')">△</button>
                        <button class="record-btn btn-err" onclick="record(${p.id},'×')">×</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function handleSwap(i) {
        if (swapIdx === null) {
            swapIdx = i;
        } else {
            const temp = courtPosition[swapIdx];
            courtPosition[swapIdx] = courtPosition[i];
            courtPosition[i] = temp;
            swapIdx = null;
        }
        render();
    }

    function record(pid, val) {
        const p = allPlayers.find(x => x.id === pid);
        const data = { id: pid, name: p.name, eval: val, time: new Date().toLocaleTimeString() };
        stats.push(data);
        console.log("記録:", data);
        
        // GAS送信（非同期）
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
    }

    function toggleModal() {
        const m = document.getElementById('modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        const list = document.getElementById('member-list');
        list.innerHTML = allPlayers.map(p => `<p>#${p.number} ${p.name}</p>`).join('');
    }

    function finishGame() {
        alert("集計完了。スプレッドシートを確認してください。");
        console.table(stats);
    }

    // 起動
    render();
</script>
</body>
</html>
