<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Court Pro</title>
    <style>
        :root {
            --court-green: #2e7d32;
            --player-bg: rgba(255, 255, 255, 0.95);
            --accent-blue: #007bff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 10px;
            color: #333;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #333;
            color: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .menu-btn {
            background: #555;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        /* コートレイアウト */
        .court {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            background: var(--court-green);
            padding: 12px;
            border: 5px solid white;
            border-radius: 12px;
            aspect-ratio: 3 / 4;
        }
        /* 選手カード */
        .player-card {
            background: var(--player-bg);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 3px solid transparent;
        }
        .active-swap {
            border-color: var(--accent-blue);
            background: #e3f2fd;
            transform: scale(1.02);
        }
        .player-num {
            background: #333;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 5px;
        }
        .player-name { font-weight: bold; font-size: 14px; }
        /* 記録ボタン */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 8px; }
        .action-grid button {
            border: none;
            padding: 12px 0;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-ace { background: #28a745; }
        .btn-eff { background: #ffc107; color: #333; }
        .btn-std { background: #6c757d; }
        .btn-err { background: #dc3545; }
        /* 交代アイコン */
        .swap-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 20px;
            cursor: pointer;
            color: var(--accent-blue);
        }
        /* モーダル */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        .btn-finish {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        #feedback-screen {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px dashed #ccc; }
    </style>
</head>
<body>

<header>
    <span>V-Stats Analyzer</span>
    <button class="menu-btn" onclick="toggleModal()">控え・リベロ</button>
</header>

<div id="main-screen">
    <div class="court" id="court">
        </div>
    <button class="btn-finish" onclick="showFeedback()">試合終了・データ分析</button>
</div>

<div id="feedback-screen">
    <h2>試合分析レポート</h2>
    <div id="report-body"></div>
    <button class="btn-finish" onclick="location.reload()">新しい試合を開始</button>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <h3>登録選手・控え一覧</h3>
        <div id="member-list"></div>
        <button class="btn-finish" style="background:#666;" onclick="toggleModal()">閉じる</button>
    </div>
</div>

<script>
    // --- 設定 ---
    const GAS_URL = "あなたのGASのデプロイURLをここに貼る";

    // 選手データ（IDで個人を識別）
    let allPlayers = [
        { id: 101, name: "山田", number: 1 },
        { id: 102, name: "佐藤", number: 2 },
        { id: 103, name: "田中", number: 3 },
        { id: 104, name: "伊藤", number: 4 },
        { id: 105, name: "渡辺", number: 5 },
        { id: 106, name: "中村", number: 6 },
        { id: 107, name: "高橋(L)", number: 12 },
        { id: 108, name: "鈴木", number: 7 }
    ];

    // コート初期配置（1〜6番ポジション）
    let courtPosition = [
        allPlayers[3], allPlayers[2], allPlayers[1], // 前衛: 左(4), 中(3), 右(2)
        allPlayers[4], allPlayers[5], allPlayers[0]  // 後衛: 左(5), 中(6), 右(1)
    ];

    let swapSourceIndex = null;
    let stats = [];

    // --- メイン描画 ---
    function renderCourt() {
        const court = document.getElementById('court');
        court.innerHTML = '';
        courtPosition.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = `player-card ${swapSourceIndex === index ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="swap-icon" onclick="handleSwap(${index})">🔄</div>
                <div class="player-info">
                    <span class="player-num">${player.number}</span>
                    <span class="player-name">${player.name}</span>
                </div>
                <div class="action-grid">
                    <button class="btn-ace" onclick="record(${player.id}, '${player.name}', '◎', ${index})">◎</button>
                    <button class="btn-eff" onclick="record(${player.id}, '${player.name}', '〇', ${index})">〇</button>
                    <button class="btn-std" onclick="record(${player.id}, '${player.name}', '△', ${index})">△</button>
                    <button class="btn-err" onclick="record(${player.id}, '${player.name}', '×', ${index})">×</button>
                </div>
            `;
            court.appendChild(card);
        });
    }

    // --- 交代ロジック ---
    function handleSwap(index) {
        if (swapSourceIndex === null) {
            swapSourceIndex = index;
            renderCourt();
        } else {
            const temp = courtPosition[swapSourceIndex];
            courtPosition[swapSourceIndex] = courtPosition[index];
            courtPosition[index] = temp;
            swapSourceIndex = null;
            renderCourt();
        }
    }

    // --- 記録ロジック (Fetch API) ---
    async function record(id, name, evaluation, posIndex) {
        const data = {
            playerId: id,
            playerName: name,
            eval: evaluation,
            pos: posIndex + 1, // 1~6のポジション
            time: new Date().toLocaleTimeString()
        };
        stats.push(data);

        // GASへ非同期送信
        try {
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GASの仕様上no-corsが必要な場合がある
                body: JSON.stringify(data)
            });
        } catch (e) { console.error("送信エラー", e); }
    }

    // --- フィードバック表示 ---
    function showFeedback() {
        if (!confirm("試合を終了して分析結果を表示しますか？")) return;

        document.getElementById('main-screen').style.display = 'none';
        const feedbackScreen = document.getElementById('feedback-screen');
        feedbackScreen.style.display = 'block';

        const report = document.getElementById('report-body');
        
        // ローテ別失点集計
        const rotErrors = {};
        stats.filter(s => s.eval === '×').forEach(s => {
            const rotName = "P" + s.pos;
            rotErrors[rotName] = (rotErrors[rotName] || 0) + 1;
        });
        const worstRot = Object.keys(rotErrors).reduce((a, b) => rotErrors[a] > rotErrors[b] ? a : b, "なし");

        // 選手別トップスコアラー
        const playerCounts = {};
        stats.filter(s => s.eval === '◎').forEach(s => {
            playerCounts[s.playerName] = (playerCounts[s.playerName] || 0) + 1;
        });
        const mvp = Object.keys(playerCounts).reduce((a, b) => playerCounts[a] > playerCounts[b] ? a : b, "未算出");

        report.innerHTML = `
            <div class="stat-row"><span>総記録数</span><span>${stats.length} 件</span></div>
            <div class="stat-row"><span>本日のMVP (◎最多)</span><span>${mvp} 選手</span></div>
            <div class="stat-row"><span>失点最多ポジション</span><span>${worstRot}</span></div>
            <p style="margin-top:20px; font-size:0.9em; color:#666;">
                ※詳細なローテーション分析と全データは、接続されたスプレッドシートにリアルタイムで保存されています。
            </p>
        `;
    }

    function toggleModal() {
        const modal = document.getElementById('modal-overlay');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        if(modal.style.display === 'flex') renderMemberList();
    }

    function renderMemberList() {
        const list = document.getElementById('member-list');
        list.innerHTML = '';
        allPlayers.forEach(p => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>#${p.number} ${p.name}</span> <small>待機中</small>`;
            list.appendChild(div);
        });
    }

    // 初期起動
    renderCourt();
</script>

</body>
</html>
