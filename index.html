<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Court Pro</title>
    <style>
        :root { --court-green: #2e7d32; --player-bg: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        
        /* ヘッダー・メニュー */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #333; color: white; border-radius: 8px; margin-bottom: 10px; }
        .menu-btn { background: #555; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* コートレイアウト */
        .court {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            background: var(--court-green);
            padding: 12px;
            border: 5px solid white;
            border-radius: 12px;
            aspect-ratio: 3 / 4;
            position: relative;
        }

        /* 選手カード */
        .player-card {
            background: var(--player-bg);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .active-swap { border: 2px solid #007bff; background: #e3f2fd; transform: scale(1.02); }

        .player-info { margin-bottom: 5px; }
        .player-num { background: #333; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 5px; }
        .player-name { font-weight: bold; font-size: 14px; }

        /* 記録ボタン */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .action-grid button { border: none; padding: 10px 0; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-ace { background: #28a745; } .btn-eff { background: #ffc107; color: #333; }
        .btn-std { background: #6c757d; } .btn-err { background: #dc3545; }

        /* 交代マーク */
        .swap-icon { position: absolute; top: 5px; right: 5px; font-size: 18px; cursor: pointer; color: #007bff; }

        /* 選手名簿モーダル */
        #member-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 85%; max-height: 80%; overflow-y: auto; }
        .member-list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        
        .footer-btns { margin-top: 20px; display: flex; gap: 10px; }
        .btn-finish { flex: 1; padding: 15px; background: #333; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <span>V-Stats Analyzer</span>
    <button class="menu-btn" onclick="toggleModal()">選手名簿</button>
</header>

<div class="court" id="court"></div>

<div class="footer-btns">
    <button class="btn-finish" onclick="finishGame()">試合終了・集計表示</button>
</div>

<div id="member-modal">
    <div class="modal-content">
        <h3>登録選手一覧</h3>
        <div id="member-list"></div>
        <button onclick="toggleModal()" style="width:100%; margin-top:15px; padding:10px;">閉じる</button>
    </div>
</div>

<div id="feedback-area" style="display:none; background:white; padding:20px; margin-top:20px; border-radius:10px;">
    <h2>試合分析結果</h2>
    <div id="report-content"></div>
    <button onclick="location.reload()" style="width:100%; padding:10px;">戻る</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwgrRe4wti0ZxSEqO8_zqASAYAYF2pPg3jzvo1MAczdpUg1kFWp61mL7vNVg7BoFZwjCg/exec";

    // 選手マスタデータ（本人特定のIDを持つ）
    let allPlayers = [
        { id: 101, name: "山田", number: 1 }, { id: 102, name: "佐藤", number: 2 },
        { id: 103, name: "田中", number: 3 }, { id: 104, name: "伊藤", number: 4 },
        { id: 105, name: "渡辺", number: 5 }, { id: 106, name: "中村", number: 6 },
        { id: 107, name: "リベロ高橋", number: 12 }, { id: 108, name: "鈴木", number: 7 }
    ];

    // コート上のポジション配置（現在誰がどの位置にいるか）
    let courtPosition = [
        allPlayers[3], allPlayers[2], allPlayers[1], // 前衛: 左(4), 中(3), 右(2)
        allPlayers[4], allPlayers[5], allPlayers[0]  // 後衛: 左(5), 中(6), 右(1)
    ];

    let swapSourceIndex = null;
    let stats = [];

    function renderCourt() {
        const court = document.getElementById('court');
        court.innerHTML = '';
        courtPosition.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = `player-card ${swapSourceIndex === index ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="swap-icon" onclick="startSwap(${index})">🔄</div>
                <div class="player-info">
                    <span class="player-num">${player.number}</span>
                    <span class="player-name">${player.name}</span>
                </div>
                <div class="action-grid">
                    <button class="btn-ace" onclick="record(${player.id}, '${player.name}', '◎')">◎</button>
                    <button class="btn-eff" onclick="record(${player.id}, '${player.name}', '〇')">〇</button>
                    <button class="btn-std" onclick="record(${player.id}, '${player.name}', '△')">△</button>
                    <button class="btn-err" onclick="record(${player.id}, '${player.name}', '×')">×</button>
                </div>
            `;
            court.appendChild(card);
        });
    }

    function startSwap(index) {
        if (swapSourceIndex === null) {
            swapSourceIndex = index;
        } else {
            const temp = courtPosition[swapSourceIndex];
            courtPosition[swapSourceIndex] = courtPosition[index];
            courtPosition[index] = temp;
            swapSourceIndex = null;
        }
        renderCourt();
    }

    async function record(playerId, playerName, eval) {
        const data = {
            playerId: playerId, // 選手本人を特定するID
            playerName: playerName,
            eval: eval,
            pos: courtPosition.findIndex(p => p.id === playerId) + 1,
            time: new Date().toLocaleString()
        };
        stats.push(data);
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) }).catch(e => console.error(e));
    }

    function toggleModal() {
        const modal = document.getElementById('member-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        renderMemberList();
    }

    function renderMemberList() {
        const list = document.getElementById('member-list');
        list.innerHTML = '';
        allPlayers.forEach(p => {
            const item = document.createElement('div');
            item.className = 'member-list-item';
            item.innerHTML = `<span>#${p.number} ${p.name}</span>`;
            list.appendChild(item);
        });
    }

    function finishGame() {
        if(!confirm("試合を終了し、個人の活躍を分析しますか？")) return;
        document.getElementById('court').parentElement.style.display = 'none';
        document.getElementById('feedback-area').style.display = 'block';
        
        // 簡易フィードバックロジック
        const report = document.getElementById('report-content');
        // ここでplayerIdごとにstatsをフィルタリングして、各選手の決定率などを計算して表示
        report.innerHTML = "<p>データ集計中...（スプレッドシートの各選手行へ紐付け完了）</p>";
    }

    renderCourt();
</script>
</body>
</html>
