<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Stats Pro v7.7</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
            --neon-blue: #00e5ff;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .main-container { display: flex; height: 100vh; padding: 4px; gap: 4px; box-sizing: border-box; }
        
        /* е·ҰеҒҙпјҡйҒёжүӢгӮЁгғӘгӮў */
        .court-section { 
            flex: 8; 
            background: var(--court-green); 
            border-radius: 4px; 
            border: 2px solid #fff; 
            display: grid; 
            /* жЁӘе№…гҒҜ3зӯүеҲҶгҖҒй«ҳгҒ•гҒҜгҖҢжңҖдҪҺ250pxгӮ’зўәдҝқгҖҚгҒ—гҖҒдҪҷгӮҢгҒ°еқҮзӯүгҒ«дјёгҒігӮӢ */
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, minmax(250px, 1fr));
            gap: 4px; 
            padding: 4px;
            box-sizing: border-box;
            /* з”»йқўгҒҢдҪҺгҒҸгҒҰ250pxГ—2ж®өгҒҢеҸҺгҒҫгӮүгҒӘгҒ„е ҙеҗҲгҒҜзёҰгӮ№гӮҜгғӯгғјгғ«гҒ•гҒӣгӮӢ */
            overflow-y: auto; 
        }
        
        /* еҸіеҒҙпјҡж“ҚдҪңгғ‘гғҚгғ« */
        .control-section { flex: 2; display: flex; flex-direction: column; gap: 4px; min-width: 160px; height: 100%; overflow: hidden; }

        .action-panel { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        
        /* жҺ§гҒҲгғЎгғӢгғҘгғј */
        .bench-menu { display: flex; flex-direction: column; gap: 2px; }
        #bench-list { 
            display: none; 
            background: #222; 
            border: 1px solid #444; 
            max-height: 200px; 
            overflow-y: auto; 
            border-radius: 0 0 4px 4px;
        }
        .bench-item { padding: 10px; border-bottom: 1px solid #333; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
        .bench-item:hover { background: #444; }

        .score-box { background: #000; border: 1px solid #555; border-radius: 6px; padding: 4px; text-align: center; }
        .score-display { font-size: 32px; font-weight: bold; color: var(--gold); line-height: 1.2; }
        .score-ctrl { display: flex; justify-content: space-around; gap: 2px; }
        .small-btn { flex: 1; height: 35px; background: #444; border: none; color: #fff; border-radius: 4px; font-size: 14px; cursor: pointer; }

        .rot-info { background: #0d47a1; border-radius: 4px; padding: 6px; text-align: center; font-weight: bold; font-size: 18px; color: var(--neon-blue); }
        #live-analysis { flex: 1; background: #000; border-top: 2px solid var(--blue); font-size: 10px; padding: 6px; color: var(--neon-blue); overflow-y: auto; }

        /* йҒёжүӢгӮ«гғјгғү */
        .player-card { 
            background: var(--card-bg); 
            border-radius: 4px; 
            padding: 4px 6px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            border: 2px solid transparent; 
            box-sizing: border-box;
        }
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 2px; margin-bottom: 2px; }
        .player-header input { background: transparent; border: none; color: #fff; font-size: 12px; font-weight: bold; width: 35%; padding: 0; }
        .selected-swap { border-color: var(--neon-blue) !important; background: #0d47a1 !important; box-shadow: inset 0 0 10px var(--blue); }

        /* еҗ„гӮ№гӮҝгғғгғ„гҒ®иЎҢпјҡжңҖдҪҺйҷҗгҒ®й«ҳгҒ•гӮ’зўәдҝқгҒ—гҒӨгҒӨеқҮзӯүй…ҚзҪ® */
        .stat-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            border-bottom: 1px solid #333; 
            padding: 2px 0; 
            min-height: 42px; /* жҪ°гӮҢгҒӘгҒ„жңҖдҪҺгҒ®й«ҳгҒ• */
        }
        .stat-label { font-size: 10px; color: var(--gold); font-weight: bold; line-height: 1; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 2px 0; }
        .btn { border: none; border-radius: 2px; color: #fff; font-size: 11px; padding: 4px 0; font-weight: bold; cursor: pointer; }
        
        .num-row { display: flex; justify-content: space-around; font-size: 13px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 3px var(--blue); line-height: 1; }
        .rate-txt { font-size: 10px; color: #aaa; line-height: 1; }

        /* гӮ№гғһгғӣзёҰз”»йқўеҗ‘гҒ‘ */
        @media screen and (max-width: 600px) {
            .court-section { grid-template-columns: 1fr; grid-template-rows: auto; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="court-section" id="court"></div>

    <div class="control-section">
        <div class="action-panel">
            <div class="bench-menu">
                <button class="cmd-btn" id="bench-trigger" style="background:var(--blue); height:40px; color:white; font-weight:bold; border-radius:4px; border:none; cursor:pointer;" onclick="toggleBench()">жҺ§гҒҲгғ»дәӨд»Ј в–ј</button>
                <div id="bench-list"></div>
            </div>
            
            <div class="score-box">
                <div class="score-display"><span id="score-us">0</span>-<span id="score-them">0</span></div>
                <div class="score-ctrl">
                    <button class="small-btn" onclick="modifyScore('us', 1)">иҮӘ+</button>
                    <button class="small-btn" onclick="modifyScore('them', 1)">зӣё+</button>
                </div>
            </div>

            <div class="rot-info">S<span id="current-rot">1</span></div>
            <div id="live-analysis"></div>

            <div style="display: flex; gap: 4px;">
                <button class="small-btn" style="flex:1;" onclick="undo()">жҲ»гӮӢ</button>
                <button class="small-btn" style="flex:1; background:var(--red);" onclick="finishGame()">ж¶ҲеҺ»</button>
            </div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'vstats_v7_6'; // гғҮгғјгӮҝеј•з¶ҷгҒҺгҒ®гҒҹгӮҒгӮӯгғјгҒҜжҚ®гҒҲзҪ®гҒҚ
    let players = JSON.parse(localStorage.getItem(STORAGE_KEY))?.players || Array.from({length: 15}, (_, i) => ({
        id: i, no: i+1, name: `йҒёжүӢ${i+1}`,
        spike:{ex:0,ok:0,bad:0,miss:0}, serve:{ex:0,ok:0,bad:0,miss:0},
        rec:{a:0,b:0,c:0,miss:0}, dig:{ex:0,ok:0,bad:0,miss:0}, block:{ex:0,ok:0,bad:0,miss:0}
    }));
    let courtIds = JSON.parse(localStorage.getItem(STORAGE_KEY))?.courtIds || [0,1,2,3,4,5];
    let score = JSON.parse(localStorage.getItem(STORAGE_KEY))?.score || {us: 0, them: 0};
    let currentRot = JSON.parse(localStorage.getItem(STORAGE_KEY))?.currentRot || 1;
    let serveRights = 'us';
    let rotStats = JSON.parse(localStorage.getItem(STORAGE_KEY))?.rotStats || Array.from({length: 7}, () => ({plus:0, minus:0}));
    let history = [];
    let swapSourceId = null;

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({players, courtIds, score, currentRot, serveRights, rotStats}));
        updateAnalysis();
    }

    function render() {
        const court = document.getElementById('court');
        court.innerHTML = '';
        [3, 2, 1, 4, 5, 0].forEach(idx => {
            const id = courtIds[idx];
            const p = players[id];
            const card = document.createElement('div');
            card.className = `player-card ${swapSourceId === id ? 'selected-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <input type="text" value="${p.no}" onchange="updateInfo(${id},'no',this.value)">
                    <input type="text" value="${p.name}" onchange="updateInfo(${id},'name',this.value)">
                    <span style="cursor:pointer; font-size:12px; color:var(--neon-blue);" onclick="handleSwap(${id})">рҹ”„дәӨд»Ј</span>
                </div>
                ${createRow(id, 'SPIKE', 'spike', ['в—Һ','в—Ӣ','в–і','Г—'])}
                ${createRow(id, 'REC', 'rec', ['A','B','C','Г—'])}
                ${createRow(id, 'SERVE', 'serve', ['в—Һ','в—Ӣ','в–і','Г—'])}
                ${createRow(id, 'BLOCK', 'block', ['в—Һ','в—Ӣ','в–і','Г—'])}
                ${createRow(id, 'DIG', 'dig', ['в—Һ','в—Ӣ','в–і','Г—'])}
            `;
            court.appendChild(card);
        });

        const blist = document.getElementById('bench-list');
        blist.innerHTML = '';
        players.forEach(p => {
            if(!courtIds.includes(p.id)) {
                const item = document.createElement('div');
                item.className = `bench-item ${swapSourceId === p.id ? 'selected-swap' : ''}`;
                item.innerHTML = `#${p.no} ${p.name}`;
                item.onclick = () => handleSwap(p.id);
                blist.appendChild(item);
            }
        });
        document.getElementById('score-us').innerText = score.us;
        document.getElementById('score-them').innerText = score.them;
        document.getElementById('current-rot').innerText = currentRot;
    }

    function createRow(pid, label, cat, btns) {
        const s = players[pid][cat];
        const counts = (cat==='rec') ? [s.a, s.b, s.c, s.miss] : [s.ex, s.ok, s.bad, s.miss];
        return `
            <div class="stat-item">
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <span class="stat-label">${label}</span>
                    <span class="rate-txt">${cat==='rec'?getRecRate(s):getEff(s)}%</span>
                </div>
                <div class="btn-grid">${btns.map((b,i)=>`<button class="btn" style="background:${['var(--gold)','var(--green)','var(--orange)','var(--red)'][i]}" onclick="record(${pid},'${cat}','${['ex','ok','bad','miss'][i]}')">${b}</button>`).join('')}</div>
                <div class="num-row">${counts.map(c=>`<span>${c}</span>`).join('')}</div>
            </div>`;
    }

    function record(pid, cat, type) {
        const key = (cat==='rec' && type==='ex') ? 'a' : (cat==='rec' && type==='ok') ? 'b' : (cat==='rec' && type==='bad') ? 'c' : type;
        players[pid][cat][key]++;
        history.push({type:'stat', pid, cat, key});
        save(); render();
    }

    function toggleBench() {
        const list = document.getElementById('bench-list');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    function handleSwap(id) {
        if(swapSourceId === null) {
            swapSourceId = id;
            if(!courtIds.includes(id)) toggleBench(); 
        } else {
            const idxSource = courtIds.indexOf(swapSourceId);
            const idxTarget = courtIds.indexOf(id);
            if(idxSource !== -1 && idxTarget !== -1) { [courtIds[idxSource], courtIds[idxTarget]] = [courtIds[idxTarget], courtIds[idxSource]]; }
            else if(idxSource !== -1) { courtIds[idxSource] = id; }
            else if(idxTarget !== -1) { courtIds[idxTarget] = swapSourceId; }
            swapSourceId = null;
            document.getElementById('bench-list').style.display = 'none';
        }
        save(); render();
    }

    function updateInfo(id, field, val) { players[id][field] = val; save(); }
    
    function modifyScore(side, val) {
        let rotated = false; let pRights = serveRights;
        if(side === 'us' && val > 0 && serveRights === 'them') { rotate(); serveRights = 'us'; rotated = true; }
        else if(side === 'them' && val > 0) serveRights = 'them';
        score[side] += val;
        if(val > 0) { if(side==='us') rotStats[currentRot].plus++; else rotStats[currentRot].minus++; }
        history.push({type:'score', side, val, rotated, pRights});
        save(); render();
    }

    function rotate() { courtIds = [courtIds[1], courtIds[2], courtIds[3], courtIds[4], courtIds[5], courtIds[0]]; currentRot = currentRot === 6 ? 1 : currentRot + 1; }

    function updateAnalysis() {
        const ana = document.getElementById('live-analysis');
        const sortedRot = [...rotStats].map((s,i)=>({i, d:s.plus-s.minus})).slice(1).sort((a,b)=>b.d-a.d);
        const bestSpiker = [...players].sort((a,b)=> (b.spike.ex - b.spike.miss) - (a.spike.ex - a.spike.miss))[0];
        ana.innerHTML = `<b>гҖҗеҲҶжһҗгҖ‘</b><br>
            жңҖй«ҳR: S${sortedRot[0].i} (+${sortedRot[0].d})<br>
            жңҖејұR: S${sortedRot[5].i} (${sortedRot[5].d})<br>
            еҫ—зӮ№зҺӢ: #${bestSpiker.no} ${bestSpiker.name}`;
    }

    function undo() {
        if(!history.length) return;
        const last = history.pop();
        if(last.type==='stat') players[last.pid][last.cat][last.key]--;
        else {
            score[last.side] -= last.val;
            if(last.val > 0) { if(last.side==='us') rotStats[currentRot].plus--; else rotStats[currentRot].minus--; }
            if(last.rotated) { courtIds = [courtIds[5], courtIds[0], courtIds[1], courtIds[2], courtIds[3], courtIds[4]]; currentRot = currentRot === 1 ? 6 : currentRot - 1; }
            serveRights = last.pRights;
        }
        save(); render();
    }

    function finishGame() { if(confirm("еҲқжңҹеҢ–гҒ—гҒҫгҒҷгҒӢпјҹ")) { localStorage.clear(); location.reload(); } }
    const getEff = (s) => { const t = s.ex+s.ok+s.bad+s.miss; return t>0?((s.ex-s.miss)/t*100).toFixed(0):0; };
    const getRecRate = (r) => { const t = r.a+r.b+r.c+r.miss; return t>0?((r.a*100+r.b*50)/t).toFixed(0):0; };
    window.onload = () => { render(); updateAnalysis(); };
</script>
</body>
</html>
