<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Stats Pro v7.5</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
            --neon-blue: #00e5ff;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .main-container { display: flex; height: 100vh; padding: 4px; gap: 4px; box-sizing: border-box; }
        
        /* 選手エリア：上下スクロール可能に */
        .court-section { 
            flex: 8; 
            background: var(--court-green); 
            border-radius: 4px; 
            border: 2px solid #fff; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: auto auto; /* 上下2段 */
            gap: 6px; 
            padding: 6px; 
            overflow-y: auto; /* 上下スクロール */
            scroll-snap-type: y proximity;
        }
        
        /* 右側：操作パネル */
        .control-section { flex: 2; display: flex; flex-direction: column; gap: 4px; min-width: 150px; }

        .action-panel { flex: 1; background: #1a1a1a; border-radius: 4px; border: 1px solid #444; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        
        .score-box { background: #000; border: 1px solid #555; border-radius: 6px; padding: 8px 4px; text-align: center; }
        .score-display { font-size: 38px; font-weight: bold; color: var(--gold); line-height: 1; margin-bottom: 8px; }
        .score-ctrl { display: flex; justify-content: space-around; gap: 4px; }
        .small-btn { flex: 1; height: 40px; background: #444; border: none; color: #fff; border-radius: 4px; font-size: 16px; cursor: pointer; }

        .rot-info { background: #0d47a1; border-radius: 4px; padding: 8px; text-align: center; font-weight: bold; font-size: 22px; color: var(--neon-blue); }
        
        #live-analysis { flex: 1; background: #000; border-top: 2px solid var(--blue); font-size: 11px; padding: 8px; color: var(--neon-blue); overflow-y: auto; }

        .cmd-btns { display: flex; flex-direction: column; gap: 4px; }
        .cmd-btn { height: 44px; border: none; border-radius: 4px; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* モーダル（控え選手） */
        #bench-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box;
        }
        .bench-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }

        /* 選手カード */
        .player-card { background: var(--card-bg); border-radius: 4px; padding: 5px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; min-height: 280px; scroll-snap-align: start; }
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 4px; }
        .player-header input { background: #333; border: none; color: #fff; font-size: 13px; font-weight: bold; width: 40%; padding: 2px 4px; border-radius: 2px; }
        .selected-swap { border-color: var(--neon-blue) !important; background: #0d47a1 !important; }

        .stat-item { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #333; padding: 2px 0; }
        .stat-label { font-size: 10px; color: var(--gold); font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 3px 0; }
        .btn { border: none; border-radius: 2px; color: #fff; font-size: 12px; padding: 8px 0; font-weight: bold; cursor: pointer; }
        
        .num-row { display: flex; justify-content: space-around; font-size: 16px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 4px var(--blue); }
        .rate-txt { font-size: 11px; color: #aaa; }

        /* モバイル横向き等の調整 */
        @media screen and (max-width: 600px) {
            .court-section { grid-template-columns: 1fr; } /* スマホ縦なら1列 */
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="court-section" id="court"></div>

    <div class="control-section">
        <div class="action-panel">
            <button class="cmd-btn" style="background:var(--blue);" onclick="toggleBench()">控え・交代</button>
            
            <div class="score-box">
                <div class="score-display"><span id="score-us">0</span>-<span id="score-them">0</span></div>
                <div class="score-ctrl">
                    <button class="small-btn" onclick="modifyScore('us', 1)">自+</button>
                    <button class="small-btn" onclick="modifyScore('them', 1)">相+</button>
                </div>
            </div>

            <div class="rot-info">S<span id="current-rot">1</span></div>
            
            <div id="live-analysis">分析中...</div>

            <div class="cmd-btns">
                <button class="cmd-btn" style="background:#444;" onclick="undo()">戻る</button>
                <button class="cmd-btn" style="background:var(--red);" onclick="finishGame()">リセット</button>
            </div>
        </div>
    </div>
</div>

<div id="bench-modal">
    <h2 style="color:var(--gold); margin:0;">控え選手リスト</h2>
    <p style="font-size:12px;">交代したい選手を選んでください</p>
    <div class="bench-grid" id="bench-list"></div>
    <button class="cmd-btn" style="width:100%; margin-top:20px; background:#444;" onclick="toggleBench()">閉じる</button>
</div>

<script>
    const STORAGE_KEY = 'vstats_v7_5';
    let players = JSON.parse(localStorage.getItem(STORAGE_KEY))?.players || Array.from({length: 15}, (_, i) => ({
        id: i, no: i+1, name: `選手${i+1}`,
        spike:{ex:0,ok:0,bad:0,miss:0}, serve:{ex:0,ok:0,bad:0,miss:0},
        rec:{a:0,b:0,c:0,miss:0}, dig:{ex:0,ok:0,bad:0,miss:0}, block:{ex:0,ok:0,bad:0,miss:0}
    }));
    let courtIds = JSON.parse(localStorage.getItem(STORAGE_KEY))?.courtIds || [0,1,2,3,4,5];
    let score = JSON.parse(localStorage.getItem(STORAGE_KEY))?.score || {us: 0, them: 0};
    let currentRot = JSON.parse(localStorage.getItem(STORAGE_KEY))?.currentRot || 1;
    let serveRights = 'us';
    let rotStats = JSON.parse(localStorage.getItem(STORAGE_KEY))?.rotStats || Array.from({length: 7}, () => ({plus:0, minus:0}));
    let history = [];
    let swapTargetId = null;

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({players, courtIds, score, currentRot, serveRights, rotStats}));
        updateAnalysis();
    }

    function render() {
        const court = document.getElementById('court');
        court.innerHTML = '';
        // 前衛(P4,3,2) 後衛(P5,6,1) の順
        [3, 2, 1, 4, 5, 0].forEach(idx => {
            const id = courtIds[idx];
            const p = players[id];
            const card = document.createElement('div');
            card.className = `player-card ${swapTargetId === id ? 'selected-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <input type="text" value="${p.no}" onchange="updateInfo(${id},'no',this.value)">
                    <input type="text" value="${p.name}" onchange="updateInfo(${id},'name',this.value)">
                    <span style="cursor:pointer;" onclick="startSwap(${id})">🔄交代</span>
                </div>
                ${createRow(id, 'SPIKE', 'spike', ['◎','○','△','×'])}
                ${createRow(id, 'REC', 'rec', ['A','B','C','×'])}
                ${createRow(id, 'SERVE', 'serve', ['◎','○','△','×'])}
                ${createRow(id, 'BLOCK', 'block', ['◎','○','△','×'])}
                ${createRow(id, 'DIG', 'dig', ['◎','○','△','×'])}
            `;
            court.appendChild(card);
        });

        const blist = document.getElementById('bench-list');
        blist.innerHTML = '';
        players.forEach(p => {
            if(!courtIds.includes(p.id)) {
                const item = document.createElement('div');
                item.className = `bench-item ${swapTargetId === p.id ? 'selected-swap' : ''}`;
                item.style = "background:#333; padding:15px; border-radius:8px; text-align:center; cursor:pointer; font-weight:bold;";
                item.innerHTML = `#${p.no} ${p.name}`;
                item.onclick = () => execSwap(p.id);
                blist.appendChild(item);
            }
        });
        document.getElementById('score-us').innerText = score.us;
        document.getElementById('score-them').innerText = score.them;
        document.getElementById('current-rot').innerText = currentRot;
    }

    function createRow(pid, label, cat, btns) {
        const s = players[pid][cat];
        const counts = (cat==='rec') ? [s.a, s.b, s.c, s.miss] : [s.ex, s.ok, s.bad, s.miss];
        return `
            <div class="stat-item">
                <div style="display:flex; justify-content:space-between;"><span class="stat-label">${label}</span><span class="rate-txt">${cat==='rec'?getRecRate(s):getEff(s)}%</span></div>
                <div class="btn-grid">${btns.map((b,i)=>`<button class="btn" style="background:${['var(--gold)','var(--green)','var(--orange)','var(--red)'][i]}" onclick="record(${pid},'${cat}','${['ex','ok','bad','miss'][i]}')">${b}</button>`).join('')}</div>
                <div class="num-row">${counts.map(c=>`<span>${c}</span>`).join('')}</div>
            </div>`;
    }

    function record(pid, cat, type) {
        const key = (cat==='rec' && type==='ex') ? 'a' : (cat==='rec' && type==='ok') ? 'b' : (cat==='rec' && type==='bad') ? 'c' : type;
        players[pid][cat][key]++;
        history.push({type:'stat', pid, cat, key});
        save(); render();
    }

    function toggleBench() { 
        const m = document.getElementById('bench-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function startSwap(id) { swapTargetId = id; toggleBench(); render(); }
    
    function execSwap(id) {
        if(swapTargetId !== null) {
            const idx = courtIds.indexOf(swapTargetId);
            if(idx !== -1) courtIds[idx] = id;
            swapTargetId = null;
        }
        toggleBench(); save(); render();
    }

    function updateInfo(id, field, val) { players[id][field] = val; save(); }

    function modifyScore(side, val) {
        let rotated = false; let pRights = serveRights;
        if(side === 'us' && val > 0 && serveRights === 'them') { rotate(); serveRights = 'us'; rotated = true; }
        else if(side === 'them' && val > 0) serveRights = 'them';
        score[side] += val;
        if(val > 0) { if(side==='us') rotStats[currentRot].plus++; else rotStats[currentRot].minus++; }
        history.push({type:'score', side, val, rotated, pRights});
        save(); render();
    }

    function rotate() { courtIds = [courtIds[1], courtIds[2], courtIds[3], courtIds[4], courtIds[5], courtIds[0]]; currentRot = currentRot === 6 ? 1 : currentRot + 1; }

    function updateAnalysis() {
        const ana = document.getElementById('live-analysis');
        const sortedRot = [...rotStats].map((s,i)=>({i, d:s.plus-s.minus})).slice(1).sort((a,b)=>b.d-a.d);
        const bestSpiker = [...players].sort((a,b)=> (b.spike.ex - b.spike.miss) - (a.spike.ex - a.spike.miss))[0];
        ana.innerHTML = `<b>【分析】</b><br>
            最高R: S${sortedRot[0].i} (+${sortedRot[0].d})<br>
            最弱R: S${sortedRot[5].i} (${sortedRot[5].d})<br>
            最多得点: #${bestSpiker.no} ${bestSpiker.name}`;
    }

    function undo() {
        if(!history.length) return;
        const last = history.pop();
        if(last.type==='stat') players[last.pid][last.cat][last.key]--;
        else {
            score[last.side] -= last.val;
            if(last.val > 0) { if(last.side==='us') rotStats[currentRot].plus--; else rotStats[currentRot].minus--; }
            if(last.rotated) { courtIds = [courtIds[5], courtIds[0], courtIds[1], courtIds[2], courtIds[3], courtIds[4]]; currentRot = currentRot === 1 ? 6 : currentRot - 1; }
            serveRights = last.pRights;
        }
        save(); render();
    }

    function finishGame() { if(confirm("データを全消去しますか？")) { localStorage.clear(); location.reload(); } }
    const getEff = (s) => { const t = s.ex+s.ok+s.bad+s.miss; return t>0?((s.ex-s.miss)/t*100).toFixed(0):0; };
    const getRecRate = (r) => { const t = r.a+r.b+r.c+r.miss; return t>0?((r.a*100+r.b*50)/t).toFixed(0):0; };
    window.onload = () => { render(); updateAnalysis(); };
</script>
</body>
</html>
