<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Stats Pro v8.8 | Emergency Fix</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
            --neon-blue: #00e5ff;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .main-container { display: flex; height: 100vh; padding: 4px; gap: 4px; box-sizing: border-box; }
        
        /* 選手エリア：絶対に高さを潰さない設定 */
        .court-section { 
            flex: 8; background: var(--court-green); border-radius: 4px; border: 2px solid #fff; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, minmax(240px, 1fr)); 
            gap: 4px; padding: 4px; box-sizing: border-box; overflow-y: auto; 
        }
        
        .control-section { flex: 2; display: flex; flex-direction: column; gap: 4px; min-width: 160px; height: 100%; overflow: hidden; }
        .action-panel { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        #bench-list { display: none; background: #222; border: 1px solid #444; max-height: 200px; overflow-y: auto; border-radius: 4px; }
        .bench-item { padding: 10px; border-bottom: 1px solid #333; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
        .score-box { background: #000; border: 1px solid #555; border-radius: 6px; padding: 4px; text-align: center; }
        .score-display { font-size: 32px; font-weight: bold; color: var(--gold); line-height: 1.2; }
        .score-ctrl { display: flex; justify-content: space-around; gap: 2px; }
        .small-btn { flex: 1; height: 35px; background: #444; border: none; color: #fff; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .rot-info { background: #0d47a1; border-radius: 4px; padding: 6px; text-align: center; font-weight: bold; font-size: 18px; color: var(--neon-blue); }
        
        .player-card { background: var(--card-bg); border-radius: 4px; padding: 4px 6px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; box-sizing: border-box; }
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 2px; margin-bottom: 2px; }
        .player-header input { background: transparent; border: none; color: #fff; font-size: 12px; font-weight: bold; width: 35%; padding: 0; }

        .stat-item { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; border-bottom: 1px solid #333; padding: 2px 0; min-height: 40px; }
        .stat-label { font-size: 9px; color: var(--gold); font-weight: bold; line-height: 1; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 1px 0; }
        .btn { border: none; border-radius: 2px; color: #fff; font-size: 11px; padding: 4px 0; font-weight: bold; cursor: pointer; }
        .num-row { display: flex; justify-content: space-around; font-size: 13px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 3px var(--blue); line-height: 1; }
        .rate-txt { font-size: 10px; color: #aaa; line-height: 1; }
        
        #sync-status { text-align: center; font-size: 10px; color: #888; margin-top: 2px; }
        .online { color: var(--green) !important; font-weight: bold; }

        @media screen and (max-width: 600px) { .court-section { grid-template-columns: 1fr; grid-template-rows: auto; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="court-section" id="court">
        </div>
    <div class="control-section">
        <div class="action-panel">
            <button id="bench-trigger" style="background:var(--blue); height:40px; color:white; font-weight:bold; border-radius:4px; border:none; cursor:pointer;" onclick="toggleBench()">控え・交代 ▼</button>
            <div id="bench-list"></div>
            
            <div class="score-box">
                <div class="score-display"><span id="score-us">0</span>-<span id="score-them">0</span></div>
                <div class="score-ctrl">
                    <button class="small-btn" onclick="modifyScore('us', 1)">自+</button>
                    <button class="small-btn" onclick="modifyScore('them', 1)">相+</button>
                </div>
            </div>

            <div class="rot-info">S<span id="current-rot">1</span></div>
            <div id="live-analysis" style="flex:1; background:#000; font-size:10px; padding:6px; color:var(--neon-blue); overflow-y:auto; border-top:1px solid #333;"></div>

            <div style="display: flex; gap: 4px;">
                <button class="small-btn" style="flex:1;" onclick="undo()">戻る</button>
                <button class="small-btn" style="flex:1; background:var(--red);" onclick="finishGame()">消去</button>
            </div>
            <div id="sync-status">● 準備中</div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwFwZOdpAHnC0GQGGg_Z7QDumuWRBQIT4dF7lqjt4uUkNKw5TA2l6fyBZ3dakWHNlwQ/exec";

    // --- 初期データの定義（これを先に読み込む） ---
    const defaultData = {
        players: Array.from({length: 15}, (_, i) => ({ 
            id: i, no: i+1, name: `選手${i+1}`, 
            spike:{ex:0,ok:0,bad:0,miss:0}, serve:{ex:0,ok:0,bad:0,miss:0}, 
            rec:{a:0,b:0,c:0,miss:0}, dig:{ex:0,ok:0,bad:0,miss:0}, block:{ex:0,ok:0,bad:0,miss:0} 
        })),
        courtIds: [0,1,2,3,4,5], 
        score: {us:0, them:0}, 
        currentRot: 1, 
        serveRights: 'us', 
        rotStats: Array.from({length: 7}, () => ({plus:0, minus:0}))
    };

    // グローバル変数を初期データで満たしておく
    let players = JSON.parse(JSON.stringify(defaultData.players));
    let courtIds = [...defaultData.courtIds];
    let score = {...defaultData.score};
    let currentRot = defaultData.currentRot;
    let serveRights = defaultData.serveRights;
    let rotStats = JSON.parse(JSON.stringify(defaultData.rotStats));
    let history = [];
    let swapSourceId = null;
    let isPushing = false;

    // --- 同期関数 ---
    function pushToCloud() {
        isPushing = true;
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({players, courtIds, score, currentRot, serveRights, rotStats}) })
        .then(() => {
            isPushing = false;
            document.getElementById('sync-status').innerText = '● 同期完了 (GAS)';
            document.getElementById('sync-status').className = 'online';
        }).catch(() => isPushing = false);
    }

    function pullFromCloud() {
        if (isPushing) return;
        fetch(GAS_URL).then(r => r.json()).then(data => {
            if (data && data.players && data.players.length > 0) {
                players = data.players; courtIds = data.courtIds; score = data.score;
                currentRot = data.currentRot; serveRights = data.serveRights; rotStats = data.rotStats;
                render(); updateAnalysis();
            }
        }).catch(err => console.log("Offline or Syncing..."));
    }

    // --- 描画関数（これが呼ばれないと真っ白になる） ---
    function render() {
        const court = document.getElementById('court');
        if (!court) return;
        court.innerHTML = '';
        [3, 2, 1, 4, 5, 0].forEach(idx => {
            const pid = courtIds[idx];
            const p = players[pid];
            if (!p) return;
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="player-header">
                    <input type="text" value="${p.no}" onchange="updateInfo(${pid},'no',this.value)">
                    <input type="text" value="${p.name}" onchange="updateInfo(${pid},'name',this.value)">
                    <span style="cursor:pointer; font-size:12px; color:var(--neon-blue); font-weight:bold;" onclick="handleSwap(${pid})">🔄交代</span>
                </div>
                ${createRow(pid, 'SPIKE', 'spike', ['◎','○','△','×'])}
                ${createRow(pid, 'REC', 'rec', ['A','B','C','×'])}
                ${createRow(pid, 'SERVE', 'serve', ['◎','○','△','×'])}
                ${createRow(pid, 'BLOCK', 'block', ['◎','○','△','×'])}
                ${createRow(pid, 'DIG', 'dig', ['◎','○','△','×'])}
            `;
            court.appendChild(card);
        });

        const blist = document.getElementById('bench-list');
        blist.innerHTML = '';
        players.forEach(p => {
            if(!courtIds.includes(p.id)) {
                const item = document.createElement('div');
                item.className = 'bench-item';
                item.innerText = `#${p.no} ${p.name}`;
                item.onclick = () => handleSwap(p.id);
                blist.appendChild(item);
            }
        });
        document.getElementById('score-us').innerText = score.us;
        document.getElementById('score-them').innerText = score.them;
        document.getElementById('current-rot').innerText = currentRot;
    }

    function createRow(pid, label, cat, btns) {
        const s = players[pid][cat];
        const counts = (cat==='rec') ? [s.a, s.b, s.c, s.miss] : [s.ex, s.ok, s.bad, s.miss];
        const rate = (cat==='rec'?getRecRate(s):getEff(s));
        return `<div class="stat-item"><div style="display:flex;justify-content:space-between"><span class="stat-label">${label}</span><span class="rate-txt">${rate}%</span></div><div class="btn-grid">${btns.map((b,i)=>`<button class="btn" style="background:${['var(--gold)','var(--green)','var(--orange)','var(--red)'][i]}" onclick="record(${pid},'${cat}','${['ex','ok','bad','miss'][i]}')">${b}</button>`).join('')}</div><div class="num-row">${counts.map(c=>`<span>${c}</span>`).join('')}</div></div>`;
    }

    function record(pid, cat, type) {
        const key = (cat==='rec' && type==='ex') ? 'a' : (cat==='rec' && type==='ok') ? 'b' : (cat==='rec' && type==='bad') ? 'c' : type;
        players[pid][cat][key]++; history.push({type:'stat', pid, cat, key}); render(); pushToCloud();
    }

    function handleSwap(id) {
        if(swapSourceId === null) { swapSourceId = id; if(!courtIds.includes(id)) toggleBench(); render(); }
        else { const idxS = courtIds.indexOf(swapSourceId), idxT = courtIds.indexOf(id); if(idxS!==-1 && idxT!==-1) [courtIds[idxS], courtIds[idxTarget]] = [courtIds[idxTarget], courtIds[idxS]]; else if(idxS!==-1) courtIds[idxS]=id; else if(idxT!==-1) courtIds[idxT]=swapSourceId; swapSourceId=null; document.getElementById('bench-list').style.display='none'; render(); pushToCloud(); }
    }

    function modifyScore(side, val) {
        let rotated = false; let pRights = serveRights;
        if(side==='us' && val>0 && serveRights==='them') { courtIds=[courtIds[1],courtIds[2],courtIds[3],courtIds[4],courtIds[5],courtIds[0]]; currentRot=currentRot===6?1:currentRot+1; serveRights='us'; rotated=true; }
        else if(side==='them' && val>0) serveRights='them';
        score[side]+=val; if(val>0) { if(side==='us') rotStats[currentRot].plus++; else rotStats[currentRot].minus++; }
        history.push({type:'score', side, val, rotated, pRights}); render(); pushToCloud();
    }

    function updateInfo(id, field, val) { players[id][field] = val; pushToCloud(); }
    function toggleBench() { const l = document.getElementById('bench-list'); l.style.display = l.style.display==='block'?'none':'block'; }
    function updateAnalysis() { /* 簡易分析ロジック */ }
    function undo() { if(!history.length) return; const last=history.pop(); if(last.type==='stat') players[last.pid][last.cat][last.key]--; else { score[last.side]-=last.val; if(last.rotated) { courtIds=[courtIds[5],courtIds[0],courtIds[1],courtIds[2],courtIds[3],courtIds[4]]; currentRot=currentRot===1?6:currentRot-1; } serveRights=last.pRights; } render(); pushToCloud(); }
    function finishGame() { if(confirm("初期化しますか？")) { players=JSON.parse(JSON.stringify(defaultData.players)); pushToCloud(); location.reload(); } }
    const getEff = (s) => { const t=s.ex+s.ok+s.bad+s.miss; return t>0?((s.ex-s.miss)/t*100).toFixed(0):0; };
    const getRecRate = (r) => { const t=r.a+r.b+r.c+r.miss; return t>0?((r.a*100+r.b*50)/t).toFixed(0):0; };

    // --- 実行開始 ---
    window.onload = () => {
        render(); // 通信を待たずに即描画！
        pullFromCloud(); // その後でGASから最新を拾う
        setInterval(pullFromCloud, 3000);
    };
</script>
</body>
</html>
