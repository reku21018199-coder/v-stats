<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Pro v3.0 | Court & Rotation Analyzer</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 5px; overflow: hidden; font-size: 11px; }
        
        /* ヘッダー・操作系 */
        header { display: flex; gap: 8px; align-items: center; padding: 5px 10px; background: #222; border-bottom: 1px solid #444; height: 40px; }
        .match-input { flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 4px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        /* メインレイアウト */
        .container { display: flex; gap: 8px; height: calc(100vh - 60px); }
        .court-area { flex: 4; display: flex; flex-direction: column; gap: 5px; }
        .sidebar { flex: 1.2; background: #222; padding: 8px; border-radius: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

        /* コート(2x3) */
        .court-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 5px; background: var(--court-green); padding: 10px; border-radius: 8px; flex-grow: 1; border: 2px solid #fff;
        }

        /* 選手カード */
        .player-card { background: var(--card-bg); border-radius: 4px; padding: 4px; border: 2px solid transparent; }
        .active-swap { border-color: var(--blue); background: #0d47a1; }
        .player-header { display: flex; align-items: center; gap: 2px; border-bottom: 1px solid #444; padding-bottom: 2px; }
        .player-header input { background: transparent; border: none; color: #fff; font-weight: bold; width: 45px; }
        
        /* スタッツ表示 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; font-size: 9px; margin: 3px 0; color: #ccc; }
        .stat-grid b { color: #fff; }

        /* ボタン群 */
        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 3px; }
        .action-btn { border: none; border-radius: 2px; color: #fff; font-size: 10px; font-weight: bold; padding: 5px 0; cursor: pointer; opacity: 0.9; }
        .action-btn:hover { opacity: 1; transform: scale(1.05); }

        /* ローテーション管理 */
        .rotation-ctrl { background: #333; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }

        /* フィードバック */
        #feedback-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .report { background: #222; padding: 20px; border-radius: 10px; max-width: 900px; margin: 0 auto; }
        .mvp-box { background: #333; border-left: 4px solid var(--gold); padding: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #444; padding: 6px; text-align: center; }
    </style>
</head>
<body>

<header>
    <input type="text" id="matchName" class="match-input" placeholder="試合名を入力">
    <div class="rotation-ctrl">
        <span>ローテ: <b>S<span id="rot-num">1</span></b></span>
        <button class="btn" style="background:var(--blue); margin-left:10px;" onclick="rotate()">回る(P+)</button>
    </div>
    <button class="btn" style="background:#555;" onclick="undo()">戻る</button>
    <button class="btn" style="background:var(--gold);" onclick="showFeedback()">試合終了・分析反映</button>
</header>

<div class="container">
    <div class="court-area">
        <div class="court-grid" id="court"></div>
    </div>
    <div class="sidebar">
        <div style="font-weight:bold; border-bottom:1px solid #555;">控え・リベロ</div>
        <div id="bench"></div>
    </div>
</div>

<div id="feedback-modal">
    <div class="report">
        <h2 style="color:var(--gold);">Game Analysis Report</h2>
        <div id="mvp-section"></div>
        <div id="rotation-report"></div>
        <div id="table-section"></div>
        <button class="btn" style="background:#444; margin-top:15px; width:100%;" onclick="document.getElementById('feedback-modal').style.display='none'">記録に戻る</button>
    </div>
</div>

<script>
    const GAS_URL = "YOUR_GAS_URL";
    
    // 選手データ（個人スタッツ）
    let players = Array.from({length: 12}, (_, i) => ({
        id: i, no: i+1, name: `選手${i+1}`,
        spike: {ex:0, ok:0, bad:0, miss:0}, serve: {ex:0, ok:0, bad:0, miss:0},
        rec: {a:0, b:0, c:0, miss:0}, dig: {ex:0, ok:0, bad:0, miss:0},
        block: {ex:0, ok:0, bad:0, miss:0}, loss: 0
    }));

    let courtIds = [3, 2, 1, 4, 5, 0]; // S1の状態
    let benchIds = [6, 7, 8, 9, 10, 11];
    let rotPos = 1;
    let history = [];
    let rotStats = Array.from({length: 7}, () => ({plus: 0, minus: 0}));
    let swapTarget = null;

    // 計算ロジック
    const getEff = (s) => {
        const t = s.ex + s.ok + s.bad + s.miss;
        return t > 0 ? ((s.ex - s.miss) / t * 100).toFixed(1) : "0.0";
    };
    const getRecRate = (r) => {
        const t = r.a + r.b + r.c + r.miss;
        return t > 0 ? ((r.a * 100 + r.b * 50) / t).toFixed(1) : "0.0";
    };

    function render() {
        renderArea('court', courtIds);
        renderArea('bench', benchIds);
        document.getElementById('rot-num').innerText = rotPos;
    }

    function renderArea(divId, idList) {
        const container = document.getElementById(divId);
        container.innerHTML = '';
        idList.forEach(id => {
            const p = players[id];
            const card = document.createElement('div');
            card.className = `player-card ${swapTarget === id ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <span style="cursor:pointer" onclick="selectSwap(${id})">🔄</span>
                    <input type="text" value="${p.no}" onchange="p.no=this.value" style="width:15px">
                    <input type="text" value="${p.name}" onchange="p.name=this.value">
                </div>
                <div class="stat-grid">
                    <span>SP率:<b>${getEff(p.spike)}%</b></span>
                    <span>SV率:<b>${getEff(p.serve)}%</b></span>
                    <span>受率:<b>${getRecRate(p.rec)}%</b></span>
                    <span>得失:<b>${p.spike.ex+p.serve.ex+p.block.ex}-${p.loss}</b></span>
                </div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'spike','ex')">S◎</button>
                    <button class="action-btn ok" onclick="record(${id},'spike','ok')">S○</button>
                    <button class="action-btn bad" onclick="record(${id},'spike','bad')">S△</button>
                    <button class="action-btn miss" onclick="record(${id},'spike','miss')">S×</button>
                </div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'serve','ex')">V◎</button>
                    <button class="action-btn ok" onclick="record(${id},'serve','ok')">V○</button>
                    <button class="action-btn bad" onclick="record(${id},'serve','bad')">V△</button>
                    <button class="action-btn miss" onclick="record(${id},'serve','miss')">V×</button>
                </div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'rec','a')">R A</button>
                    <button class="action-btn ok" onclick="record(${id},'rec','b')">R B</button>
                    <button class="action-btn blue" onclick="record(${id},'rec','c')">R C</button>
                    <button class="action-btn miss" onclick="record(${id},'rec','miss')">R ×</button>
                </div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'block','ex')">B◎</button>
                    <button class="action-btn ok" onclick="record(${id},'block','ok')">B○</button>
                    <button class="action-btn ex" onclick="record(${id},'dig','ex')">D◎</button>
                    <button class="action-btn miss" onclick="record(${id},'dig','miss')">D×</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function record(pid, cat, type) {
        players[pid][cat][type]++;
        let isPlus = (type === 'ex' && cat !== 'dig');
        let isMinus = (type === 'miss');
        
        if (isPlus) rotStats[rotPos].plus++;
        if (isMinus) { players[pid].loss++; rotStats[rotPos].minus++; }
        
        history.push({pid, cat, type, isPlus, isMinus, rot: rotPos});
        render();
        saveGas();
    }

    function rotate() {
        // ローテーション移動 [P4, P3, P2, P5, P6, P1] -> 時計回り
        const p = courtIds;
        courtIds = [p[1], p[2], p[5], p[0], p[3], p[4]];
        rotPos = rotPos === 6 ? 1 : rotPos + 1;
        render();
    }

    function selectSwap(id) {
        if (swapTarget === null) { swapTarget = id; render(); }
        else {
            let aIdx = courtIds.indexOf(swapTarget); if(aIdx===-1) aIdx = benchIds.indexOf(swapTarget) + 100;
            let bIdx = courtIds.indexOf(id); if(bIdx===-1) bIdx = benchIds.indexOf(id) + 100;
            
            if(aIdx < 100) courtIds[aIdx] = id; else benchIds[aIdx-100] = id;
            if(bIdx < 100) courtIds[bIdx] = swapTarget; else benchIds[bIdx-100] = swapTarget;
            
            swapTarget = null; render();
        }
    }

    function showFeedback() {
        const modal = document.getElementById('feedback-modal');
        modal.style.display = 'block';

        // 分析ロジック
        const bestSpiker = [...players].sort((a,b) => getEff(b.spike) - getEff(a.spike))[0];
        const bestServer = [...players].sort((a,b) => getEff(b.serve) - getEff(a.serve))[0];
        const bestRec = [...players].sort((a,b) => getRecRate(b.rec) - getRecRate(a.rec))[0];
        const bestRot = [...rotStats].map((s,i)=>({i, val:s.plus-s.minus})).sort((a,b)=>b.val-a.val)[0];

        document.getElementById('mvp-section').innerHTML = `
            <div class="mvp-box">
                <b>🏆 項目別トップ貢献者</b><br>
                🔥 スパイク決定率1位: ${bestSpiker.name} (${getEff(bestSpiker.spike)}%)<br>
                ⚡ サーブ効果率1位: ${bestServer.name} (${getEff(bestServer.serve)}%)<br>
                🛡️ レセプション成功率1位: ${bestRec.name} (${getRecRate(bestRec.rec)}%)
            </div>
        `;
        
        let rotHtml = "<b>📊 ローテーション分析</b><br>";
        rotStats.forEach((s, i) => { if(i===0)return;
            rotHtml += `S${i}: <span style="color:var(--green)">+${s.plus}</span> / <span style="color:var(--red)">-${s.minus}</span> (Diff: ${s.plus-s.minus}) | `;
        });
        document.getElementById('rotation-report').innerHTML = `<div class="mvp-box">${rotHtml}</div>`;
    }

    function undo() {
        if (history.length === 0) return;
        const last = history.pop();
        players[last.pid][last.cat][last.type]--;
        if (last.isPlus) rotStats[last.rot].plus--;
        if (last.isMinus) { players[last.pid].loss--; rotStats[last.rot].minus--; }
        render();
    }

    async function saveGas() {
        const payload = { match: document.getElementById('matchName').value, players, rotStats };
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    render();
</script>
</body>
</html>
