<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Pro Analyzer</title>
    <style>
        :root {
            --court-green: #1b5e20;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-blue: #2196f3;
            --gold: #d4af37;
            --red: #f44336;
            --green: #4caf50;
            --orange: #ff9800;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text-color); margin: 0; padding: 5px; overflow: hidden; }
        
        /* ヘッダー */
        header { display: flex; gap: 10px; align-items: center; padding: 5px 10px; background: #222; border-bottom: 1px solid #444; height: 40px; }
        .match-input { flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 4px; }
        .btn { padding: 5px 15px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* メインレイアウト */
        .main-container { display: flex; gap: 10px; height: calc(100vh - 65px); margin-top: 5px; }

        /* コートエリア (2x3) */
        .court-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 5px; background: var(--court-green); padding: 8px; border-radius: 8px; flex: 4;
        }

        /* サイドバー (控え選手) */
        .bench-sidebar { flex: 1; background: #222; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }

        /* 選手カード */
        .player-card {
            background: var(--card-bg); border-radius: 4px; padding: 4px; display: flex; flex-direction: column;
            border: 2px solid transparent; font-size: 11px; position: relative;
        }
        .active-swap { border-color: var(--accent-blue); background: #0d47a1; }

        .player-header { display: flex; align-items: center; gap: 3px; border-bottom: 1px solid #444; padding-bottom: 2px; }
        .player-header input { background: transparent; border: none; color: #fff; font-size: 11px; font-weight: bold; }
        .swap-icon { cursor: pointer; color: var(--accent-blue); font-size: 14px; }

        .stat-line { display: flex; justify-content: space-between; font-size: 10px; margin: 2px 0; color: #aaa; }
        .val { color: #fff; font-weight: bold; }

        /* ボタンセクション */
        .section-label { font-size: 9px; color: #888; text-align: center; margin-top: 2px; border-top: 1px solid #333; }
        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 1px; }
        .btn-row.two-col { grid-template-columns: 1fr 1fr; }
        
        .action-btn { border: none; border-radius: 2px; color: #fff; font-size: 10px; font-weight: bold; padding: 4px 0; cursor: pointer; }
        .ex { background: var(--gold); } .ok { background: var(--green); } .bad { background: var(--orange); } .miss { background: var(--red); }
        .blue { background: var(--accent-blue); }

        /* フィードバック画面 */
        #feedback-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px; overflow-y: auto;
        }
        .report-card { background: #222; padding: 20px; border-radius: 12px; max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; font-size: 12px; }
        th { background: #333; }
    </style>
</head>
<body>

<header>
    <input type="text" id="matchName" class="match-input" placeholder="試合名を入力">
    <button class="btn" style="background:#555;" onclick="undo()">戻る</button>
    <button class="btn" style="background:#2e7d32;" onclick="downloadCSV()">CSV出力</button>
    <button class="btn" style="background:#c62828;" onclick="showFeedback()">試合終了・分析</button>
</header>

<div class="main-container">
    <div class="court-grid" id="court"></div>
    <div class="bench-sidebar">
        <div style="font-size:12px; color:#aaa; margin-bottom:5px;">控え選手</div>
        <div id="bench"></div>
    </div>
</div>

<div id="feedback-overlay">
    <div class="report-card">
        <h2>試合終了レポート</h2>
        <div id="report-content"></div>
        <button class="btn" style="background:#444; margin-top:20px;" onclick="document.getElementById('feedback-overlay').style.display='none'">分析を閉じる</button>
    </div>
</div>

<script>
    const GAS_URL = "YOUR_GAS_URL_HERE";

    // 選手データ（12名分用意、スタッツは選手個人に紐付け）
    let players = Array.from({length: 12}, (_, i) => ({
        id: i,
        no: i + 1,
        name: `選手${i + 1}`,
        spike: {ex:0, ok:0, bad:0, miss:0},
        serve: {ex:0, ok:0, bad:0, miss:0},
        reception: {a:0, b:0, c:0, miss:0},
        block: {ex:0, ok:0},
        dig: {ex:0, ok:0, bad:0, miss:0},
        loss: 0
    }));

    // コート配置（インデックス）と控え配置
    let courtIds = [3, 2, 1, 4, 5, 0]; // 0-5が最初に出場
    let benchIds = [6, 7, 8, 9, 10, 11];
    let history = [];
    let swapTarget = null;

    // 効果率算出 (JVA基準)
    const calcSpikeEff = (s) => {
        const tot = s.ex + s.ok + s.bad + s.miss;
        return tot > 0 ? (((s.ex - s.miss) / tot) * 100).toFixed(1) : "0.0";
    };
    const calcServeEff = (s) => {
        const tot = s.ex + s.ok + s.bad + s.miss;
        return tot > 0 ? (((s.ex * 100 + s.ok * 25) / tot)).toFixed(1) : "0.0";
    };
    const calcRecEff = (r) => {
        const tot = r.a + r.b + r.c + r.miss;
        return tot > 0 ? (((r.a * 100 + r.b * 50) / tot)).toFixed(1) : "0.0";
    };

    function render() {
        renderArea('court', courtIds);
        renderArea('bench', benchIds);
    }

    function renderArea(elementId, idList) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        idList.forEach((id, posIdx) => {
            const p = players[id];
            const card = document.createElement('div');
            card.className = `player-card ${swapTarget && swapTarget.id === id ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <span class="swap-icon" onclick="selectSwap(${id}, '${elementId}')">🔄</span>
                    <input type="text" value="${p.no}" onchange="updateP(${id},'no',this.value)" style="width:15px">
                    <input type="text" value="${p.name}" onchange="updateP(${id},'name',this.value)">
                </div>
                <div class="stat-line">
                    <span>得:<span class="val">${p.spike.ex + p.serve.ex + p.block.ex}</span></span>
                    <span>失:<span class="val">${p.loss}</span></span>
                    <span>SP率:<span class="val">${calcSpikeEff(p.spike)}%</span></span>
                </div>
                
                <div class="section-label">SPIKE</div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'spike','ex')">◎</button>
                    <button class="action-btn ok" onclick="record(${id},'spike','ok')">○</button>
                    <button class="action-btn bad" onclick="record(${id},'spike','bad')">△</button>
                    <button class="action-btn miss" onclick="record(${id},'spike','miss')">×</button>
                </div>

                <div class="section-label">SERVE</div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'serve','ex')">◎</button>
                    <button class="action-btn ok" onclick="record(${id},'serve','ok')">○</button>
                    <button class="action-btn bad" onclick="record(${id},'serve','bad')">△</button>
                    <button class="action-btn miss" onclick="record(${id},'serve','miss')">×</button>
                </div>

                <div class="section-label">RECEPTION</div>
                <div class="btn-row">
                    <button class="action-btn ex" onclick="record(${id},'reception','a')">A</button>
                    <button class="action-btn ok" onclick="record(${id},'reception','b')">B</button>
                    <button class="action-btn blue" onclick="record(${id},'reception','c')">C</button>
                    <button class="action-btn miss" onclick="record(${id},'reception','miss')">×</button>
                </div>

                <div class="section-label">BLOCK / DIG</div>
                <div class="btn-row">
                    <button class="action-btn ex" title="Block OK" onclick="record(${id},'block','ex')">B◎</button>
                    <button class="action-btn ok" title="Block OneTouch" onclick="record(${id},'block','ok')">B○</button>
                    <button class="action-btn ok" onclick="record(${id},'dig','ex')">D◎</button>
                    <button class="action-btn bad" onclick="record(${id},'dig','miss')">D×</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function record(pid, cat, type) {
        players[pid][cat][type]++;
        let isLoss = (type === 'miss' && cat !== 'dig'); // Digのミスは失点に加算しない等の調整可
        if (isLoss) players[pid].loss++;
        history.push({pid, cat, type, isLoss});
        render();
        saveToGas();
    }

    function selectSwap(id, area) {
        if (!swapTarget) {
            swapTarget = {id, area};
        } else {
            const idx1 = courtIds.indexOf(swapTarget.id);
            const idx2 = courtIds.indexOf(id);
            const bIdx1 = benchIds.indexOf(swapTarget.id);
            const bIdx2 = benchIds.indexOf(id);

            // 配置の入れ替えロジック
            if (idx1 !== -1) courtIds[idx1] = id; else benchIds[bIdx1] = id;
            if (idx2 !== -1) courtIds[idx2] = swapTarget.id; else benchIds[bIdx2] = swapTarget.id;

            swapTarget = null;
        }
        render();
    }

    function showFeedback() {
        const overlay = document.getElementById('feedback-overlay');
        const content = document.getElementById('report-content');
        overlay.style.display = 'block';

        let html = `<table><tr><th>背番号</th><th>名前</th><th>総得点</th><th>総失点</th><th>スパイク効果率</th><th>サーブ効果率</th><th>受球成功率</th></tr>`;
        players.forEach(p => {
            const score = p.spike.ex + p.serve.ex + p.block.ex;
            html += `<tr><td>${p.no}</td><td>${p.name}</td><td>${score}</td><td>${p.loss}</td><td>${calcSpikeEff(p.spike)}%</td><td>${calcServeEff(p.serve)}%</td><td>${calcRecEff(p.reception)}%</td></tr>`;
        });
        html += `</table>`;
        content.innerHTML = html;
    }

    async function saveToGas() {
        const match = document.getElementById('matchName').value;
        const payload = { match, players, timestamp: new Date().toLocaleString() };
        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    function undo() {
        if (history.length === 0) return;
        const last = history.pop();
        players[last.pid][last.cat][last.type]--;
        if (last.isLoss) players[last.pid].loss--;
        render();
    }

    function updateP(id, key, val) { players[id][key] = val; }
    function downloadCSV() { /* CSV出力処理 */ }

    render();
</script>
</body>
</html>
