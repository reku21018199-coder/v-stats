<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Stats Pro v3.1 | High-Visibility Mode</title>
    <style>
        :root {
            --court-green: #1b5e20; --card-bg: #1e1e1e; --text: #fff;
            --gold: #d4af37; --green: #4caf50; --orange: #ff9800; --red: #f44336; --blue: #2196f3;
        }
        body { font-family: sans-serif; background: #121212; color: var(--text); margin: 0; padding: 5px; overflow: hidden; }
        
        header { display: flex; gap: 8px; align-items: center; padding: 5px 10px; background: #222; border-bottom: 1px solid #444; height: 40px; }
        .match-input { flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 4px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        .container { display: flex; gap: 8px; height: calc(100vh - 60px); }
        .court-area { flex: 6; display: flex; flex-direction: column; } /* 出場メンバーを広く */
        .sidebar { flex: 1; background: #222; padding: 8px; border-radius: 8px; overflow-y: auto; } /* 控えを細く */

        .court-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 10px; background: var(--court-green); padding: 10px; border-radius: 8px; flex-grow: 1; border: 2px solid #fff;
        }

        /* 選手カード (3行構成を維持するための設計) */
        .player-card { background: var(--card-bg); border-radius: 6px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; }
        .active-swap { border-color: var(--blue); background: #0d47a1; }
        .player-header { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; border-bottom: 1px solid #444; }
        .player-header input { background: transparent; border: none; color: #fff; font-weight: bold; font-size: 14px; }

        /* 項目ごとの3行セクション */
        .stat-section { margin-bottom: 8px; text-align: center; }
        .label { font-size: 10px; color: #aaa; font-weight: bold; display: block; }
        .eff-display { font-size: 12px; font-weight: bold; display: block; margin-top: 2px; }
        .high-eff { color: #00ff00; text-shadow: 0 0 5px rgba(0,255,0,0.5); } /* 高水準の強調 */

        .btn-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 2px; }
        .action-btn { border: none; border-radius: 3px; color: #fff; font-size: 12px; font-weight: bold; padding: 8px 0; cursor: pointer; }
        
        /* ボタン色復活 */
        .ex { background: var(--gold) !important; } 
        .ok { background: var(--green) !important; } 
        .bad { background: var(--orange) !important; } 
        .miss { background: var(--red) !important; }
        .blue { background: var(--blue) !important; }

        /* 控え選手用（シンプル表示） */
        .bench-item { background: #333; padding: 8px; margin-bottom: 4px; border-radius: 4px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        #feedback-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; }
        .report { background: #222; padding: 20px; border-radius: 10px; max-width: 900px; margin: 0 auto; overflow-y: auto; height: 90%; }
    </style>
</head>
<body>

<header>
    <input type="text" id="matchName" class="match-input" placeholder="試合名">
    <div style="background:#333; padding:5px 10px; border-radius:4px;">
        <span>ローテ: <b id="rot-num">1</b></span>
        <button class="btn blue" style="margin-left:5px;" onclick="rotate()">回転</button>
    </div>
    <button class="btn" style="background:#555;" onclick="undo()">戻る</button>
    <button class="btn ex" onclick="showFeedback()">分析終了</button>
</header>

<div class="container">
    <div class="court-area">
        <div class="court-grid" id="court"></div>
    </div>
    <div class="sidebar" id="bench">
        <div style="font-weight:bold; margin-bottom:10px; color:#aaa;">控え選手</div>
    </div>
</div>

<div id="feedback-modal">
    <div class="report" id="report-content"></div>
    <button class="btn" style="background:#444; width:100%; margin-top:10px;" onclick="document.getElementById('feedback-modal').style.display='none'">閉じる</button>
</div>

<script>
    const GAS_URL = "YOUR_GAS_URL";
    
    let players = Array.from({length: 15}, (_, i) => ({
        id: i, no: i+1, name: `選手${i+1}`,
        spike: {ex:0, ok:0, bad:0, miss:0}, serve: {ex:0, ok:0, bad:0, miss:0},
        rec: {a:0, b:0, c:0, miss:0}, dig: {ex:0, ok:0, bad:0, miss:0},
        block: {ex:0, ok:0, bad:0, miss:0}, loss: 0
    }));

    let courtIds = [0, 1, 2, 3, 4, 5]; 
    let benchIds = [6, 7, 8, 9, 10, 11, 12, 13, 14];
    let rotPos = 1;
    let history = [];
    let swapTarget = null;

    const getEff = (s) => {
        const t = s.ex + s.ok + s.bad + s.miss;
        return t > 0 ? ((s.ex - s.miss) / t * 100).toFixed(1) : "0.0";
    };
    const getRecRate = (r) => {
        const t = r.a + r.b + r.c + r.miss;
        return t > 0 ? ((r.a * 100 + r.b * 50) / t).toFixed(1) : "0.0";
    };

    function render() {
        // 出場メンバー描画
        const court = document.getElementById('court');
        court.innerHTML = '';
        courtIds.forEach(id => {
            const p = players[id];
            const spEff = getEff(p.spike);
            const svEff = getEff(p.serve);
            const rcEff = getRecRate(p.rec);

            const card = document.createElement('div');
            card.className = `player-card ${swapTarget === id ? 'active-swap' : ''}`;
            card.innerHTML = `
                <div class="player-header">
                    <span style="cursor:pointer" onclick="selectSwap(${id})">🔄</span>
                    <input type="text" value="${p.no}" onchange="updateP(${id},'no',this.value)" style="width:25px">
                    <input type="text" value="${p.name}" onchange="updateP(${id},'name',this.value)">
                </div>
                
                <div class="stat-section">
                    <span class="label">SPIKE</span>
                    <div class="btn-row">
                        <button class="action-btn ex" onclick="record(${id},'spike','ex')">◎</button>
                        <button class="action-btn ok" onclick="record(${id},'spike','ok')">○</button>
                        <button class="action-btn bad" onclick="record(${id},'spike','bad')">△</button>
                        <button class="action-btn miss" onclick="record(${id},'spike','miss')">×</button>
                    </div>
                    <span class="eff-display ${spEff >= 40 ? 'high-eff' : ''}">${spEff}%</span>
                </div>

                <div class="stat-section">
                    <span class="label">SERVE</span>
                    <div class="btn-row">
                        <button class="action-btn ex" onclick="record(${id},'serve','ex')">◎</button>
                        <button class="action-btn ok" onclick="record(${id},'serve','ok')">○</button>
                        <button class="action-btn bad" onclick="record(${id},'serve','bad')">△</button>
                        <button class="action-btn miss" onclick="record(${id},'serve','miss')">×</button>
                    </div>
                    <span class="eff-display ${svEff >= 15 ? 'high-eff' : ''}">${svEff}%</span>
                </div>

                <div class="stat-section">
                    <span class="label">RECEPTION</span>
                    <div class="btn-row">
                        <button class="action-btn ex" onclick="record(${id},'rec','a')">A</button>
                        <button class="action-btn ok" onclick="record(${id},'rec','b')">B</button>
                        <button class="action-btn blue" onclick="record(${id},'rec','c')">C</button>
                        <button class="action-btn miss" onclick="record(${id},'rec','miss')">×</button>
                    </div>
                    <span class="eff-display ${rcEff >= 60 ? 'high-eff' : ''}">${rcEff}%</span>
                </div>
            `;
            court.appendChild(card);
        });

        // 控えメンバー描画 (名前と背番号のみ)
        const bench = document.getElementById('bench');
        bench.innerHTML = '<div style="font-weight:bold; margin-bottom:10px; color:#aaa;">控え選手</div>';
        benchIds.forEach(id => {
            const p = players[id];
            const item = document.createElement('div');
            item.className = `bench-item ${swapTarget === id ? 'active-swap' : ''}`;
            item.onclick = () => selectSwap(id);
            item.innerHTML = `<span>#${p.no}</span> <b>${p.name}</b>`;
            bench.appendChild(item);
        });
        document.getElementById('rot-num').innerText = rotPos;
    }

    function record(pid, cat, type) {
        players[pid][cat][type]++;
        if (type === 'miss' && cat !== 'dig') players[pid].loss++;
        history.push({pid, cat, type});
        render();
        saveGas();
    }

    function selectSwap(id) {
        if (swapTarget === null) { swapTarget = id; render(); }
        else {
            let aIn = courtIds.indexOf(swapTarget); 
            let bIn = courtIds.indexOf(id);
            if (aIn !== -1 && bIn !== -1) { [courtIds[aIn], courtIds[bIn]] = [courtIds[bIn], courtIds[aIn]]; }
            else if (aIn !== -1) { courtIds[aIn] = id; benchIds[benchIds.indexOf(id)] = swapTarget; }
            else if (bIn !== -1) { courtIds[bIn] = swapTarget; benchIds[benchIds.indexOf(swapTarget)] = id; }
            swapTarget = null; render();
        }
    }

    function rotate() {
        const p = courtIds;
        courtIds = [p[1], p[2], p[5], p[0], p[3], p[4]];
        rotPos = rotPos === 6 ? 1 : rotPos + 1;
        render();
    }

    function updateP(id, key, val) { players[id][key] = val; }
    function undo() { if(history.length>0){ const l=history.pop(); players[l.pid][l.cat][l.type]--; render(); }}
    async function saveGas() { /* Fetch implementation */ }

    function showFeedback() {
        const modal = document.getElementById('feedback-modal');
        modal.style.display = 'block';
        // (以前のフィードバックロジックをここに集計して表示)
        document.getElementById('report-content').innerHTML = "<h2>分析レポート生成中...</h2>";
    }

    render();
</script>
</body>
</html>
